<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#171715">
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <link rel="alternate" type="application/rss+xml" title="Curious Signal" href="{{ '/feed.xml' | absolute_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <script src="{{ '/assets/js/archive.js' | relative_url }}" defer></script>
    <script src="{{ '/assets/js/external-links.js' | relative_url }}" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="wordmark" href="{{ '/' | relative_url }}" aria-label="Curious Signal home">
        <span class="signal-mark" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
        <span>Curious Signal</span>
      </a>
      <nav aria-label="Primary navigation">
        <a href="{{ '/' | relative_url }}#editions">Editions</a>
        <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
      </nav>
    </header>
    <main>{{ content }}</main>
    <footer class="site-footer">
      <p><strong>Curious Signal</strong> · Listen closely. Follow the sources.</p>
      <p>Published from Chiang Mai · <a href="{{ '/feed.xml' | relative_url }}">RSS feed</a></p>
    </footer>
  </body>
</html>
